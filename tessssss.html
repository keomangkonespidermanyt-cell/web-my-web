<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a12;
    font-family: 'Rajdhani', sans-serif;
    padding: 40px 20px;
  }

  h2 {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    letter-spacing: 0.3em;
    color: #fff;
    margin-bottom: 40px;
    text-transform: uppercase;
  }
  h2 span { color: #e91e8c; }

  /* ===== CARDS WRAPPER ===== */
  .cards {
    display: flex;        /* ລຽນລວງນອນ */
    flex-wrap: wrap;      /* ຂຶ້ນແຖວໃໝ່ຖ້າໜ້າຈໍແຄບ */
    gap: 16px;
    justify-content: center;
  }

  /* ===== CARD ===== */
  .card {
    width: 160px;
    background: #13132a;
    border: 1px solid rgba(233, 30, 140, 0.2);
    border-radius: 12px;
    padding: 28px 20px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  /* glow ດ້ານລຸ່ມ card */
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 60%; height: 2px;
    border-radius: 2px;
    background: var(--color);
    box-shadow: 0 0 12px var(--color);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    transform: translateY(-6px);
    border-color: var(--color);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(233,30,140,0.15);
  }
  .card:hover::after { opacity: 1; }

  /* ICON */
  .icon {
    font-size: 2.2rem;
    margin-bottom: 14px;
    display: block;
  }

  /* ຊື່ພາສາ */
  .lang {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  /* LEVEL BADGE */
  .level {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    color: var(--color);
    border: 1px solid var(--color);
    margin-bottom: 16px;
  }

  /* PROGRESS BAR */
  .bar-bg {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--color);
    box-shadow: 0 0 8px var(--color);
    width: 0%;
    transition: width 1s ease;
  }

  /* PERCENT */
  .percent {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    margin-top: 8px;
  }

</style>
</head>
<body>

  <h2>My <span>Skills</span></h2>

 
  <section>
    <div class="cards">

      <!-- HTML -->
      <div class="card" style="--color: #e44d26;">
        <span class="icon">🌐</span>
        <div class="lang">HTML</div>
        <div class="level">Intermediate</div>
        <div class="bar-bg">
          <div class="bar-fill" data-width="75"></div>
        </div>
        <div class="percent">75%</div>
      </div>

      
      <div class="card" style="--color: #264de4;">
        <span class="icon">🎨</span>
        <div class="lang">CSS</div>
        <div class="level">Beginner</div>
        <div class="bar-bg">
          <div class="bar-fill" data-width="50"></div>
        </div>
        <div class="percent">50%</div>
      </div>

      
      <div class="card" style="--color: #f7df1e;">
        <span class="icon">⚡</span>
        <div class="lang">JavaScript</div>
        <div class="level">Beginner</div>
        <div class="bar-bg">
          <div class="bar-fill" data-width="30"></div>
        </div>
        <div class="percent">30%</div>
      </div>

      
      <div class="card" style="--color: #5c9bd6;">
        <span class="icon">🔵</span>
        <div class="lang">C</div>
        <div class="level">Beginner</div>
        <div class="bar-bg">
          <div class="bar-fill" data-width="40"></div>
        </div>
        <div class="percent">40%</div>
      </div>

      
      <div class="card" style="--color: #9c5af7;">
        <span class="icon">⚙️</span>
        <div class="lang">C++</div>
        <div class="level">Beginner</div>
        <div class="bar-bg">
          <div class="bar-fill" data-width="35"></div>
        </div>
        <div class="percent">35%</div>
      </div>

    </div>
  </section>

  <script>
    
    window.addEventListener('load', () => {
      document.querySelectorAll('.bar-fill').forEach(bar => {
        const w = bar.getAttribute('data-width');
        setTimeout(() => { bar.style.width = w + '%'; }, 300);
      });
    });
  </script>

</body>
</html>
